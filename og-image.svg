<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Flexi House — modulární domy na míru">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b2545"/><stop offset="1" stop-color="#07172e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#8dc63f" stop-opacity="0.22"/><stop offset="1" stop-color="#8dc63f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="r1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5aa9e6"/><stop offset="1" stop-color="#103563"/></linearGradient>
    <linearGradient id="r2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b4dd6a"/><stop offset="1" stop-color="#4d7c1a"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- logo mark -->
  <g transform="translate(96 96)">
    <path d="M40 8 L74 38 L74 70 L6 70 L6 38 Z" fill="url(#r1)" stroke="#b4dd6a" stroke-width="2" stroke-linejoin="round"/>
    <path d="M40 8 L74 38 L56 38 L40 22 Z" fill="url(#r2)"/>
    <rect x="30" y="44" width="20" height="26" rx="1.5" fill="#07172e"/>
    <text x="92" y="52" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="34" font-weight="700" fill="#ffffff">Flexi House</text>
  </g>
  <!-- headline -->
  <text x="96" y="312" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">Modulární domy na míru.</text>
  <text x="96" y="402" font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="76" font-weight="800" fill="#8dc63f" letter-spacing="-2" font-style="italic">Hotové za 21 dní.</text>
  <text x="96" y="470" font-family="Arial,sans-serif" font-size="30" fill="rgba(255,255,255,0.75)">Glamping · rodinné bydlení · kanceláře — Praha · Litomyšl · Brno</text>
  <!-- chips -->
  <g font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="24" font-weight="700">
    <rect x="96" y="516" width="190" height="58" rx="29" fill="rgba(141,198,63,0.14)" stroke="rgba(141,198,63,0.4)"/>
    <text x="124" y="553" fill="#b4dd6a">21 dní hotovo</text>
    <rect x="306" y="516" width="160" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.16)"/>
    <text x="334" y="553" fill="#ffffff">5 let záruka</text>
    <rect x="486" y="516" width="210" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.16)"/>
    <text x="514" y="553" fill="#ffffff">200+ realizací v ČR</text>
  </g>
</svg>
